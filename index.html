<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Học Tiếng Anh Mỗi Ngày - Luyện Chép Chính Tả</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .select-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: #fff;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            height: 44px;
        }

        #player-container {
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        #player {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }

        .subtitle-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        .sentence-navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .sentence-info {
            font-weight: 600;
            font-size: 15px;
            color: var(--primary);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
            width: 100%;
        }

        button {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 4px;
            min-height: 50px;
            background-color: #e2e8f0;
            color: #334155;
        }

        button small {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
            display: none;
        }

        @media (min-width: 600px) {
            button small { display: inline; }
            body { padding: 20px; }
            .container { padding: 30px; }
            h2 { font-size: 24px; }
        }

        button:active {
            transform: scale(0.97);
        }

        .input-group {
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 70px;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .action-btn {
            background-color: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            height: 48px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 4px rgb(37 99 235 / 0.2);
        }

        .result-box {
            padding: 12px;
            border-radius: 10px;
            background-color: #f8fafc;
            border: 1px dashed var(--border);
            min-height: 45px;
            font-size: 16px;
            line-height: 1.6;
            word-break: break-word;
            box-sizing: border-box;
        }

        .word-correct {
            color: var(--success);
            font-weight: 600;
        }

        .word-incorrect {
            color: var(--danger);
            text-decoration: line-through;
            font-weight: 600;
            margin: 0 2px;
        }

        .word-missing {
            color: #94a3b8;
            font-style: italic;
        }

        .dictionary-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid #e2e8f0;
        }

        .dict-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .dict-input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .dict-input-group button {
            background-color: #64748b;
            color: white;
            min-height: 40px;
            padding: 0 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Luyện Chép Chính Tả Tiếng Anh</h2>

    <div class="select-group">
        <label for="lessonSelect">Chọn Bài Học:</label>
        <select id="lessonSelect" onchange="changeLesson()"></select>
    </div>

    <div id="player-container">
        <div id="player"></div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
        <label style="margin-bottom: 0;">Phụ đề gốc của câu:</label>
        <button id="toggleSubBtn" onclick="toggleSubtitleVisibility()" style="min-height: 28px; padding: 2px 10px; font-size: 12px; background-color: #64748b; color: white;">👁️ Ẩn phụ đề gốc</button>
    </div>
    <div class="subtitle-box" id="subtitleDisplay">Phụ đề sẽ hiển thị ở đây.</div>

    <div class="sentence-navigation">
        <button onclick="prevSentence()" style="min-height:36px; padding:2px 10px;">⏮️ Lùi câu</button>
        <div class="sentence-info" id="sentenceInfo">Câu: 0 / 0</div>
        <button onclick="nextSentence()" style="min-height:36px; padding:2px 10px;">Kế tiếp ⏭️</button>
    </div>

    <div class="controls-grid">
        <button id="rewindBtn" onclick="toggleSingleSentenceLoop()">🔄 Nghe lại<br><small>(Ctrl+Up)</small></button>
        <button id="playPauseBtn" onclick="togglePlay()" style="background-color: var(--primary); color: white;">⏸️ Tạm dừng<br><small>(Ctrl+Space)</small></button>
        <button onclick="nextSentence()">⏭️ Câu tiếp<br><small>(Ctrl+Right)</small></button>
    </div>

    <div style="margin-top: 12px; display: flex; gap: 8px; align-items: center; justify-content: center; width: 100%;">
        <input type="text" id="customReviewInput" placeholder="Ví dụ: 1,4,5 hoặc 1-5" style="padding: 8px; border: 1px solid var(--border); border-radius: 8px; flex: 1; max-width: 180px; text-align: center; font-size: 14px; height: 38px; box-sizing: border-box;">
        <button id="customPlayBtn" onclick="playCustomSentences()" style="background-color: #10b981; color: white; padding: 0 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; height: 38px; font-weight: bold; flex-direction: row; gap: 4px; transition: background-color 0.2s;">🔁 Nghe loạt câu</button>
    </div>

    <div class="input-group" style="margin-top: 15px;">
        <label for="userInput">Gõ lại câu nghe được tại đây:</label>
        <textarea id="userInput" placeholder="Nhập câu trả lời của anh tại đây..." oninput="autoCheckOnInput()"></textarea>
    </div>

    <button class="action-btn" onclick="checkAnswers()">🔍 Kiểm tra đúng sai</button>

    <label>Kết quả đối chiếu chi tiết:</label>
    <div class="result-box" id="resultDisplay">Kết quả đúng sai (xanh/đỏ) sẽ hiển thị ở đây.</div>

    <div class="dictionary-box">
        <label style="color: #475569;">💡 Bàn Tra Từ Điển IPA Từ Đơn Nhanh:</label>
        <div class="dict-input-group">
            <input type="text" id="dictWordInput" placeholder="Nhập một từ muốn xem phát âm..." onkeydown="if(event.keyCode===13) searchIPA()">
            <button onclick="searchIPA()">Tra Cứu</button>
        </div>
        <div id="dictResultDisplay" style="font-size: 14px; color: #475569; font-style: italic; padding-left: 5px;"></div>
    </div>
</div>

<script>
    var DANH_SACH_BAI_HOC = [
        {
            title: "Bài học 1: Daily Habits (Close the Door)",
            videoId: "rzFS6eqyepw",
            subtitles: `
1
00:00:00,000 --> 00:00:04,500
INTRO. LET'S START

2
00:00:12,500 --> 00:00:19,700
Let me close this door. This is a hardwood door.

3
00:00:20,100 --> 00:00:27,000
You can hear it's very thick, very thick and strong and sturdy.

4
00:00:27,100 --> 00:00:30,000
This is a sturdy door.

5
00:00:30,100 --> 00:00:33,000
Now I'm going to lock the door and

6
00:00:33,100 --> 00:00:38,000
I'm going to lock it as well with the deadbolt lock.

7
00:00:38,100 --> 00:00:42,000
This is just a safety lock so that if someone tries to open it

8
00:00:42,100 --> 00:00:47,900
This latch will stop the door from opening and this right here is a deadbolt lock.

9
00:00:48,000 --> 00:00:51,900
This is my key card. My key card.

10
00:00:53,900 --> 00:01:05,000
Now I'm sure you're probably wondering and thinking to yourself what is in my hand

11
00:01:05,100 --> 00:01:07,500
I'm about to show you.
`
        },
        {
            title: "Bài học 2: At the Airport (Luyện nghe nâng cao)",
            videoId: "eNvUS-6PTbs",
            subtitles: `
1
00:00:01,000 --> 00:00:05,000
Practice makes perfect every single day.

2
00:00:05,100 --> 00:00:10,000
Learning a new language opens up your world.
`
        }
    ];

    var player;
    var currentSubtitles = [];
    var currentSentenceIndex = 0;
    var currentLessonIndex = 0;
    var isPlaying = false;
    var timeCheckInterval;
    var showSubtitle = true;

    // Quản lý biến phát lặp loạt câu
    var customPlayQueue = [];
    var isCustomPlaying = false;
    var currentQueueIndex = 0;
    var customTimeoutId = null;

    // Quản lý biến phát lặp 1 câu liên tục
    var isSingleLooping = false;
    var singleLoopTimeoutId = null;

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    window.onload = function() {
        var select = document.getElementById('lessonSelect');
        DANH_SACH_BAI_HOC.forEach(function(lesson, idx) {
            var opt = document.createElement('option');
            opt.value = idx;
            opt.innerHTML = lesson.title;
            select.appendChild(opt);
        });
        currentSubtitles = parseSRT(DANH_SACH_BAI_HOC[0].subtitles);
        updateNavigationUI();
        renderSubtitleText();
    };

    function onYouTubeIframeAPIReady() {
        if(DANH_SACH_BAI_HOC.length > 0) {
            player = new YT.Player('player', {
                videoId: DANH_SACH_BAI_HOC[0].videoId,
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'disablekb': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
    }

    function onPlayerReady(event) {
        // Ready
    }

    function onPlayerStateChange(event) {
        var btn = document.getElementById('playPauseBtn');
        if (event.data == YT.PlayerState.PLAYING) {
            isPlaying = true;
            btn.innerHTML = "⏸️ Tạm dừng<br><small>(Ctrl+Space)</small>";
            btn.style.backgroundColor = "#ef4444"; 
            startTimeChecker();
        } else {
            isPlaying = false;
            btn.innerHTML = "▶️ Tiếp tục<br><small>(Ctrl+Space)</small>";
            btn.style.backgroundColor = "var(--primary)";
            clearInterval(timeCheckInterval);
        }
    }

    function changeLesson() {
        stopAllLoops();
        var select = document.getElementById('lessonSelect');
        currentLessonIndex = parseInt(select.value, 10);
        var lesson = DANH_SACH_BAI_HOC[currentLessonIndex];
        
        currentSubtitles = parseSRT(lesson.subtitles);
        currentSentenceIndex = 0;
        
        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById(lesson.videoId);
        }
        
        updateNavigationUI();
        renderSubtitleText();
        clearInputs();
    }

    function parseSRT(srtText) {
        var lines = srtText.trim().split('\n');
        var result = [];
        var currentItem = null;

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;

            if (!isNaN(line) && line.indexOf('-->') === -1) {
                if (currentItem) result.push(currentItem);
                currentItem = { id: line, text: "" };
            } else if (line.indexOf('-->') !== -1) {
                if (currentItem) {
                    var parts = line.split('-->');
                    currentItem.start = timeToSeconds(parts[0].trim());
                    currentItem.end = timeToSeconds(parts[1].trim());
                }
            } else {
                if (currentItem) {
                    currentItem.text += (currentItem.text ? " " : "") + line;
                }
            }
        }
        if (currentItem) result.push(currentItem);
        return result;
    }

    function timeToSeconds(timeStr) {
        var parts = timeStr.split(':');
        var secsParts = parts[2].split(',');
        var hours = parseInt(parts[0], 10);
        var mins = parseInt(parts[1], 10);
        var secs = parseInt(secsParts[0], 10);
        var ms = parseInt(secsParts[1], 10);
        return (hours * 3600) + (mins * 60) + secs + (ms / 1000);
    }

    function toggleSubtitleVisibility() {
        showSubtitle = !showSubtitle;
        var btn = document.getElementById('toggleSubBtn');
        if (showSubtitle) {
            btn.innerHTML = "👁️ Ẩn phụ đề gốc";
            btn.style.backgroundColor = "#64748b";
        } else {
            btn.innerHTML = "👁️ Hiện phụ đề gốc";
            btn.style.backgroundColor = "#2563eb";
        }
        renderSubtitleText();
    }

    function renderSubtitleText() {
        var box = document.getElementById('subtitleDisplay');
        if (currentSubtitles.length > 0 && currentSubtitles[currentSentenceIndex]) {
            if (showSubtitle) {
                box.innerHTML = currentSubtitles[currentSentenceIndex].text;
                box.style.color = "#334155";
            } else {
                box.innerHTML = "<i>Phụ đề gốc đang ẩn (Bấm nút phía trên để xem)</i>";
                box.style.color = "#94a3b8";
            }
        } else {
            box.innerHTML = "Không có dữ liệu phụ đề.";
        }
    }

    function selectSentence(index) {
        if (index < 0 || index >= currentSubtitles.length) return;
        stopAllLoops(); 

        currentSentenceIndex = index;
        var sub = currentSubtitles[index];
        updateNavigationUI();
        renderSubtitleText();
        clearInputs();

        if (player && typeof player.seekTo === 'function') {
            player.seekTo(sub.start, true);
            player.playVideo();
        }
    }

    function startTimeChecker() {
        clearInterval(timeCheckInterval);
        timeCheckInterval = setInterval(function() {
            if (player && typeof player.getCurrentTime === 'function' && isPlaying) {
                var currentTime = player.getCurrentTime();
                var sub = currentSubtitles[currentSentenceIndex];
                
                if (sub && currentTime >= sub.end) {
                    // Nếu không chạy bất cứ chế độ lặp đặc biệt nào, kết thúc câu sẽ nhảy tua lại từ đầu câu để chờ gõ
                    if (!isCustomPlaying && !isSingleLooping) {
                        player.pauseVideo();
                        player.seekTo(sub.start, true);
                    }
                }
            }
        }, 100);
    }

    function togglePlay() {
        if (isCustomPlaying || isSingleLooping) stopAllLoops(); 
        if (!player || typeof player.getPlayerState !== 'function') return;
        if (isPlaying) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    }

    function rewindSentence() {
        // Hàm chạy khi dùng phím tắt Ctrl+Up
        if (isSingleLooping) {
            stopSingleSentenceLoop();
        } else {
            selectSentence(currentSentenceIndex);
        }
    }

    function nextSentence() {
        stopAllLoops();
        if (currentSentenceIndex < currentSubtitles.length - 1) {
            selectSentence(currentSentenceIndex + 1);
        } else {
            alert("Đã đến câu cuối cùng của bài học!");
        }
    }

    function prevSentence() {
        stopAllLoops();
        if (currentSentenceIndex > 0) {
            selectSentence(currentSentenceIndex - 1);
        }
    }

    function updateNavigationUI() {
        var info = document.getElementById('sentenceInfo');
        if (currentSubtitles.length > 0) {
            info.innerHTML = "Câu: " + (currentSentenceIndex + 1) + " / " + currentSubtitles.length;
        } else {
            info.innerHTML = "Câu: 0 / 0";
        }
    }

    function clearInputs() {
        document.getElementById('userInput').value = "";
        document.getElementById('resultDisplay').innerHTML = "Kết quả đúng sai (xanh/đỏ) sẽ hiển thị ở đây.";
        var oldIpa = document.getElementById('sentenceIpaDisplay');
        if (oldIpa) oldIpa.innerHTML = "";
    }

    function autoCheckOnInput() {
        var userText = document.getElementById('userInput').value.trim();
        if (!userText) {
            document.getElementById('resultDisplay').innerHTML = "Kết quả đúng sai (xanh/đỏ) sẽ hiển thị ở đây.";
            var oldIpa = document.getElementById('sentenceIpaDisplay');
            if (oldIpa) oldIpa.innerHTML = "";
            return;
        }
        
        var correctText = currentSubtitles[currentSentenceIndex].text;
        var userWords = userText.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g,"").split(/\s+/).filter(Boolean);
        var correctWords = correctText.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g,"").split(/\s+/).filter(Boolean);
        
        var isMatchSoFar = true;
        for (var i = 0; i < userWords.length; i++) {
            if (i >= correctWords.length || userWords[i] !== correctWords[i]) {
                isMatchSoFar = false;
                break;
            }
        }
        
        if (isMatchSoFar && userWords.length === correctWords.length) {
            checkAnswers();
        }
    }

    function checkAnswers() {
        var userText = document.getElementById('userInput').value.trim();
        if (!userText) {
            alert("Anh vui lòng nhập câu đã nghe trước khi kiểm tra!");
            return;
        }

        var correctText = currentSubtitles[currentSentenceIndex].text;
        
        var cleanUser = userText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g," ");
        var cleanCorrect = correctText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g," ");
        
        var userWords = cleanUser.split(/\s+/).filter(Boolean);
        var correctWords = cleanCorrect.split(/\s+/).filter(Boolean);

        var resultHtml = "";
        var maxLen = Math.max(userWords.length, correctWords.length);

        for (var i = 0; i < maxLen; i++) {
            var uW = userWords[i] ? userWords[i] : "";
            var cW = correctWords[i] ? correctWords[i] : "";

            if (uW.toLowerCase() === cW.toLowerCase()) {
                resultHtml += `<span class="word-correct">${userWords[i]}</span> `;
            } else {
                if (uW && cW) {
                    resultHtml += `<span class="word-incorrect">${uW}</span><span style="color:#94a3b8; font-size:12px;">(${cW})</span> `;
                } else if (uW && !cW) {
                    resultHtml += `<span class="word-incorrect">${uW}</span> `;
                } else if (!uW && cW) {
                    resultHtml += `<span class="word-missing">_cW_</span> `;
                }
            }
        }

        document.getElementById('resultDisplay').innerHTML = resultHtml;

        if (userText && !resultHtml.includes('word-incorrect') && !resultHtml.includes('_')) {
            getSentenceIPA(correctText);
        } else {
            var oldIpa = document.getElementById('sentenceIpaDisplay');
            if (oldIpa) oldIpa.innerHTML = "";
        }
    }

    function getSentenceIPA(sentenceText) {
        var resultDisplay = document.getElementById('resultDisplay');
        var ipaDiv = document.getElementById('sentenceIpaDisplay');
        
        if (!ipaDiv) {
            ipaDiv = document.createElement('div');
            ipaDiv.id = 'sentenceIpaDisplay';
            ipaDiv.style.marginTop = '10px';
            ipaDiv.style.padding = '10px';
            ipaDiv.style.backgroundColor = '#f0fdf4';
            ipaDiv.style.border = '1px solid #bbf7d0';
            ipaDiv.style.borderRadius = '8px';
            ipaDiv.style.fontSize = '15px';
            ipaDiv.style.color = '#166534';
            ipaDiv.style.lineHeight = '1.5';
            resultDisplay.parentNode.insertBefore(ipaDiv, resultDisplay.nextSibling);
        }
        
        ipaDiv.innerHTML = "🔄 Đang tải phiên âm IPA (AmE)...";
        
        var cleanSentence = sentenceText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g,"");
        var words = cleanSentence.toLowerCase().split(/\s+/).filter(Boolean);
        
        var ipaResults = new Array(words.length);
        var completedRequests = 0;

        if (words.length === 0) {
            ipaDiv.innerHTML = "";
            return;
        }

        words.forEach(function(word, index) {
            if (word === "this") { ipaResults[index] = "ðɪs"; checkComplete(); return; }
            if (word === "is") { ipaResults[index] = "ɪz"; checkComplete(); return; }
            if (word === "a") { ipaResults[index] = "ə"; checkComplete(); return; }
            if (word === "the") { ipaResults[index] = "ðə"; checkComplete(); return; }
            if (word === "door") { ipaResults[index] = "dɔːɹ"; checkComplete(); return; }

            fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
                .then(response => response.json())
                .then(data => {
                    var phonetic = "";
                    if (data && data[0]) {
                        if (data[0].phonetics && data[0].phonetics.length > 0) {
                            var usPhonetics = data[0].phonetics.filter(p => p.text && (p.audio && p.audio.includes('-us') || !p.text.includes('ə')));
                            if (usPhonetics.length > 0) {
                                phonetic = usPhonetics[0].text;
                            } else {
                                for (var p of data[0].phonetics) {
                                    if (p.text && !p.text.includes('ə')) { phonetic = p.text; break; }
                                }
                                if (!phonetic) phonetic = data[0].phonetics[0].text;
                            }
                        }
                    }
                    
                    if (phonetic) {
                        phonetic = phonetic.replace(/\//g, "");
                    } else {
                        phonetic = word;
                    }
                    
                    if (word.endsWith('r') && !phonetic.endsWith('ɹ') && !phonetic.endsWith('r')) {
                        phonetic = phonetic + 'ɹ';
                    }
                    
                    ipaResults[index] = phonetic;
                    checkComplete();
                })
                .catch(err => {
                    ipaResults[index] = word;
                    checkComplete();
                });
        });

        function checkComplete() {
            completedRequests++;
            if (completedRequests === words.length) {
                ipaDiv.innerHTML = `🇺🇸 <strong>IPA (AmE):</strong> <span style="font-family: 'Segoe UI'; font-size: 16px; color: #2563eb;">/${ipaResults.join(" ")}/</span>`;
            }
        }
    }

    // ==========================================
    // CHẾ ĐỘ 1: PHÁT LẶP 1 CÂU LIÊN TỤC (NGHE LẠI)
    // ==========================================
    function toggleSingleSentenceLoop() {
        if (isSingleLooping) {
            stopSingleSentenceLoop();
            return;
        }

        stopCustomLoop(); // Tắt lặp loạt câu nếu đang bật

        if (currentSubtitles.length === 0) return;

        isSingleLooping = true;
        var btn = document.getElementById('rewindBtn');
        btn.innerHTML = "⏹️ Dừng lặp câu<br><small>(Ctrl+Up)</small>";
        btn.style.backgroundColor = "var(--danger)";
        btn.style.color = "white";

        playSingleSentenceExecution();
    }

    function playSingleSentenceExecution() {
        if (!isSingleLooping) return;

        var sub = currentSubtitles[currentSentenceIndex];
        if (player && typeof player.seekTo === 'function') {
            player.seekTo(sub.start, true);
            player.playVideo();
        }

        var durationMs = (sub.end - sub.start) * 1000;

        if (singleLoopTimeoutId) clearTimeout(singleLoopTimeoutId);
        
        // Thời gian dừng cho mỗi lần lặp lại thiết lập chuẩn là 1000ms (1s)
        singleLoopTimeoutId = setTimeout(function() {
            if (isSingleLooping) {
                playSingleSentenceExecution(); 
            }
        }, durationMs + 1000); 
    }

    function stopSingleSentenceLoop() {
        if (!isSingleLooping) return;
        isSingleLooping = false;
        if (singleLoopTimeoutId) clearTimeout(singleLoopTimeoutId);

        var btn = document.getElementById('rewindBtn');
        btn.innerHTML = "🔄 Nghe lại<br><small>(Ctrl+Up)</small>";
        btn.style.backgroundColor = "#e2e8f0";
        btn.style.color = "#334155";

        if (player && typeof player.pauseVideo === 'function') {
            player.pauseVideo();
        }
    }


    // ==========================================
    // CHẾ ĐỘ 2: PHÁT LẶP LOẠT CÂU LIÊN TỤC 
    // ==========================================
    function playCustomSentences() {
        if (isCustomPlaying) {
            stopCustomLoop();
            return;
        }

        stopSingleSentenceLoop(); // Tắt lặp 1 câu nếu đang bật

        var inputVal = document.getElementById('customReviewInput').value.trim();
        if (!inputVal) {
            alert("Anh vui lòng nhập số câu (ví dụ: 1,4,5 hoặc 1-5)");
            return;
        }

        customPlayQueue = [];
        var parts = inputVal.split(',');
        
        for (var i = 0; i < parts.length; i++) {
            var part = parts[i].trim();
            if (part.includes('-')) {
                var range = part.split('-');
                var start = parseInt(range[0], 10);
                var end = parseInt(range[1], 10);
                if (!isNaN(start) && !isNaN(end) && start <= end) {
                    for (var j = start; j <= end; j++) {
                        customPlayQueue.push(j - 1);
                    }
                }
            } else {
                var num = parseInt(part, 10);
                if (!isNaN(num)) {
                    customPlayQueue.push(num - 1);
                }
            }
        }

        if (customPlayQueue.length > 0) {
            isCustomPlaying = true;
            
            var btn = document.getElementById('customPlayBtn');
            btn.innerHTML = "⏹️ Dừng nghe loạt câu";
            btn.style.backgroundColor = "var(--danger)";
            
            currentQueueIndex = 0;
            playQueueIndex(currentQueueIndex);
        } else {
            alert("Định dạng chuỗi nhập chưa đúng, anh kiểm tra lại nhé!");
        }
    }

    function playQueueIndex(queueIdx) {
        if (!isCustomPlaying) return;
        
        // Quay vòng lặp lại vô hạn chuỗi câu
        if (queueIdx >= customPlayQueue.length) {
            currentQueueIndex = 0;
            playQueueIndex(0);
            return;
        }
        
        currentQueueIndex = queueIdx;
        var targetSentenceIdx = customPlayQueue[currentQueueIndex];
        
        if (targetSentenceIdx >= 0 && targetSentenceIdx < currentSubtitles.length) {
            currentSentenceIndex = targetSentenceIdx;
            
            updateNavigationUI();
            renderSubtitleText();
            clearInputs();

            if (player && typeof player.seekTo === 'function') {
                player.seekTo(currentSubtitles[currentSentenceIndex].start, true);
                player.playVideo();
            }
            
            var sub = currentSubtitles[currentSentenceIndex];
            var durationMs = (sub.end - sub.start) * 1000;
            
            if (customTimeoutId) clearTimeout(customTimeoutId);
            
            // Thời gian nghỉ chuyển câu tăng lên đúng 1000ms (1s) theo yêu cầu
            customTimeoutId = setTimeout(function() {
                if (isCustomPlaying) {
                    playQueueIndex(currentQueueIndex + 1);
                }
            }, durationMs + 1000); 
        } else {
            playQueueIndex(currentQueueIndex + 1);
        }
    }

    function stopCustomLoop() {
        if (!isCustomPlaying) return;
        isCustomPlaying = false;
        if (customTimeoutId) clearTimeout(customTimeoutId);
        
        var btn = document.getElementById('customPlayBtn');
        btn.innerHTML = "🔁 Nghe loạt câu";
        btn.style.backgroundColor = "#10b981";
        
        if (player && typeof player.pauseVideo === 'function') {
            player.pauseVideo();
        }
    }

    // Bộ dọn dẹp tắt tất cả lặp khi bấm nút chuyển hướng khác
    function stopAllLoops() {
        stopSingleSentenceLoop();
        stopCustomLoop();
    }

    function searchIPA() {
        var word = document.getElementById('dictWordInput').value.trim();
        var resultDiv = document.getElementById('dictResultDisplay');
        if (!word) { resultDiv.innerHTML = "Vui lòng nhập một từ."; return; }
        
        resultDiv.innerHTML = "Đang tra...";
        fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
            .then(response => response.json())
            .then(data => {
                if (data && data[0]) {
                    var phonetic = data[0].phonetic || "";
                    if (!phonetic && data[0].phonetics) {
                        for (var p of data[0].phonetics) {
                            if (p.text) { phonetic = p.text; break; }
                        }
                    }
                    if (phonetic) {
                        if (!phonetic.startsWith('/')) phonetic = '/' + phonetic;
                        if (!phonetic.endsWith('/')) phonetic = phonetic + '/';
                        resultDiv.innerHTML = `IPA của <strong>${word}</strong> là: <span style="color: #2563eb; font-size: 16px;">${phonetic}</span>`;
                    } else {
                        resultDiv.innerHTML = `Tìm thấy từ nhưng chưa có sẵn ký tự IPA.`;
                    }
                } else {
                    resultDiv.innerHTML = "❌ Không tìm thấy từ này.";
                }
            })
            .catch(err => { resultDiv.innerHTML = "⚠️ Lỗi kết nối từ điển."; });
    }

    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey) {
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            else if (e.code === 'ArrowUp') { e.preventDefault(); toggleSingleSentenceLoop(); } // Chuyển đổi phím tắt lên thành công tắc lặp 1 câu
            else if (e.code === 'ArrowRight') { e.preventDefault(); nextSentence(); }
        }
    });
</script>
