    function parseSRT(srtText) {
        var lines = srtText.trim().split('\n');
        var result = [];
        var currentItem = null;

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;

            if (!isNaN(line) && line.indexOf('-->') === -1) {
                if (currentItem) result.push(currentItem);
                currentItem = { id: line, text: "" };
            } else if (line.indexOf('-->') !== -1) {
                if (currentItem) {
                    var parts = line.split('-->');
                    currentItem.start = timeToSeconds(parts[0].trim());
                    currentItem.end = timeToSeconds(parts[1].trim());
                }
            } else {
                if (currentItem) {
                    currentItem.text += (currentItem.text ? " " : "") + line;
                }
            }
        }
        if (currentItem) result.push(currentItem);
        return result;
    }

        var hours = parseInt(parts[0], 10);
        var mins = parseInt(parts[1], 10);
        var secs = parseInt(secsParts[0], 10);
        var ms = parseInt(secsParts[1], 10);
        return (hours * 3600) + (mins * 60) + secs + (ms / 1000);
    }

    function selectSentence(index) {
        // Nếu không thuộc cơ chế tự phát chuỗi thì ngắt chế độ hàng đợi phát loạt câu
        if (!isCustomPlaying) {
            isCustomPlaying = false;
        }

        currentSentenceIndex = index;
        var sub = currentSubtitles[index];
        updateNavigationUI();
        clearInputs();

        if (player && typeof player.seekTo === 'function') {
            player.seekTo(sub.start, true);
            player.playVideo();
        }
    }

    function startTimeChecker() {
        clearInterval(timeCheckInterval);
        timeCheckInterval = setInterval(function() {
            if (player && typeof player.getCurrentTime === 'function' && isPlaying) {
                var currentTime = player.getCurrentTime();
                var sub = currentSubtitles[currentSentenceIndex];
                
                // Khi phát vượt thời gian câu hiện tại, tự động dừng lại để người dùng nghe chép chính tả
                if (sub && currentTime >= sub.end) {
                    // Nếu đang chạy hàng đợi chuỗi câu tự chọn thì để hàm setTimeout quản lý việc nhảy tiếp
                    if (!isCustomPlaying) {
                        player.pauseVideo();
                        player.seekTo(sub.start, true);
                    }
                }
            }
        }, 100);
    }

    function togglePlay() {
        if (!player || typeof player.getPlayerState !== 'function') return;
        if (isPlaying) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    }

    function rewindSentence() {
        selectSentence(currentSentenceIndex);
    }

    function nextSentence() {
        if (currentSentenceIndex < currentSubtitles.length - 1) {
            selectSentence(currentSentenceIndex + 1);
        } else {
            alert("Đã đến câu cuối cùng của bài học!");
        }
    }

    function prevSentence() {
        if (currentSentenceIndex > 0) {
            selectSentence(currentSentenceIndex - 1);
        }
    }

    function updateNavigationUI() {
        var info = document.getElementById('sentenceInfo');
        if (currentSubtitles.length > 0) {
            info.innerHTML = "Câu: " + (currentSentenceIndex + 1) + " / " + currentSubtitles.length;
        } else {
            info.innerHTML = "Câu: 0 / 0";
        }
    }

    function clearInputs() {
        document.getElementById('userInput').value = "";
        document.getElementById('resultDisplay').innerHTML = "Kết quả đúng sai (xanh/đỏ) sẽ hiển thị ở đây.";
        if (document.getElementById('sentenceIpaDisplay')) {
            document.getElementById('sentenceIpaDisplay').innerHTML = "";
        }
    }

    // Tự động kiểm tra nhanh khi gõ phím trực tiếp
    function autoCheckOnInput() {
        var userText = document.getElementById('userInput').value.trim();
        if (!userText) {
            document.getElementById('resultDisplay').innerHTML = "Kết quả đúng sai (xanh/đỏ) sẽ hiển thị ở đây.";
            if (document.getElementById('sentenceIpaDisplay')) {
                document.getElementById('sentenceIpaDisplay').innerHTML = "";
            }
            return;
        }
        
        var correctText = currentSubtitles[currentSentenceIndex].text;
        var userWords = userText.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g,"").split(/\s+/).filter(Boolean);
        var correctWords = correctText.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g,"").split(/\s+/).filter(Boolean);
        
        var isMatchSoFar = true;
        for (var i = 0; i < userWords.length; i++) {
            if (i >= correctWords.length || userWords[i] !== correctWords[i]) {
                isMatchSoFar = false;
                break;
            }
        }
        
        // Nếu gõ hoàn toàn chuẩn xác và khớp tổng số từ, kích hoạt kiểm tra sâu kèm IPA AmE ngay
        if (isMatchSoFar && userWords.length === correctWords.length) {
            checkAnswers();
        }
    }

    // Hàm chấm điểm đối chiếu chi tiết văn bản
    function checkAnswers() {
        var userText = document.getElementById('userInput').value.trim();
        if (!userText) {
            alert("Anh vui lòng nhập câu đã nghe trước khi kiểm tra!");
            return;
        }

        var correctText = currentSubtitles[currentSentenceIndex].text;
        
        // Làm sạch và bóc tách mảng từ
        var cleanUser = userText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g," ");
        var cleanCorrect = correctText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g," ");
        
        var userWords = cleanUser.split(/\s+/).filter(Boolean);
        var correctWords = cleanCorrect.split(/\s+/).filter(Boolean);

        var resultHtml = "";
        var maxLen = Math.max(userWords.length, correctWords.length);

        for (var i = 0; i < maxLen; i++) {
            var uW = userWords[i] ? userWords[i] : "";
            var cW = correctWords[i] ? correctWords[i] : "";

            if (uW.toLowerCase() === cW.toLowerCase()) {
                resultHtml += `<span class="word-correct">${userWords[i]}</span> `;
            } else {
                if (uW && cW) {
                    resultHtml += `<span class="word-incorrect">${uW}</span><span style="color:#94a3b8; font-size:12px;">(${cW})</span> `;
                } else if (uW && !cW) {
                    resultHtml += `<span class="word-incorrect">${uW}</span> `;
                } else if (!uW && cW) {
                    resultHtml += `<span class="word-missing">_${cW}_</span> `;
                }
            }
        }

        document.getElementById('resultDisplay').innerHTML = resultHtml;

        // CHÈN TÍNH NĂNG TỰ ĐỘNG GỌI IPA KHI TRẢ LỜI ĐÚNG HOÀN TOÀN
        if (userText && !resultHtml.includes('word-incorrect') && !resultHtml.includes('_')) {
            getSentenceIPA(correctText);
        } else {
            var oldIpa = document.getElementById('sentenceIpaDisplay');
            if (oldIpa) oldIpa.innerHTML = "";
        }
    }

    // --- TÍNH NĂNG 1: TỰ ĐỘNG HIỂN THỊ IPA CHUẨN MỸ CẢ CÂU (AmE) ---
    function getSentenceIPA(sentenceText) {
        var resultDisplay = document.getElementById('resultDisplay');
        var ipaDiv = document.getElementById('sentenceIpaDisplay');
        
        if (!ipaDiv) {
            ipaDiv = document.createElement('div');
            ipaDiv.id = 'sentenceIpaDisplay';
            ipaDiv.style.marginTop = '10px';
            ipaDiv.style.padding = '10px';
            ipaDiv.style.backgroundColor = '#f0fdf4';
            ipaDiv.style.border = '1px solid #bbf7d0';
            ipaDiv.style.borderRadius = '8px';
            ipaDiv.style.fontSize = '15px';
            ipaDiv.style.color = '#166534';
            ipaDiv.style.lineHeight = '1.5';
            resultDisplay.parentNode.insertBefore(ipaDiv, resultDisplay.nextSibling);
        }
        
        ipaDiv.innerHTML = "🔄 Đang tải phiên âm IPA (AmE)...";
        
        var cleanSentence = sentenceText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g,"");
        var words = cleanSentence.toLowerCase().split(/\s+/).filter(Boolean);
        
        var ipaResults = new Array(words.length);
        var completedRequests = 0;

        if (words.length === 0) {
            ipaDiv.innerHTML = "";
            return;
        }

        words.forEach(function(word, index) {
            // Hệ thống Từ điển bảo lưu (Ép cứng chuẩn AmE rõ ràng từng từ)
            if (word === "this") { ipaResults[index] = "ðɪs"; checkComplete(); return; }
            if (word === "is") { ipaResults[index] = "ɪz"; checkComplete(); return; }
            if (word === "a") { ipaResults[index] = "ə"; checkComplete(); return; }
            if (word === "the") { ipaResults[index] = "ðə"; checkComplete(); return; }
            if (word === "door") { ipaResults[index] = "dɔːɹ"; checkComplete(); return; }
            if (word === "hardwood") { ipaResults[index] = "ˈhɑɹdˌwʊd"; checkComplete(); return; }

            fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
                .then(response => response.json())
                .then(data => {
                    var phonetic = "";
                    if (data && data[0]) {
                        if (data[0].phonetics && data[0].phonetics.length > 0) {
                            // Lọc ưu tiên bộ nhãn giọng Mỹ và loại bỏ âm đọc lướt yếu 'ə'
                            var usPhonetics = data[0].phonetics.filter(p => p.text && (p.audio && p.audio.includes('-us') || !p.text.includes('ə')));
                            if (usPhonetics.length > 0) {
                                phonetic = usPhonetics[0].text;
                            } else {
                                for (var p of data[0].phonetics) {
                                    if (p.text && !p.text.includes('ə')) { phonetic = p.text; break; }
                                }
                                if (!phonetic) phonetic = data[0].phonetics[0].text;
                            }
                        }
                        if (!phonetic && data[0].phonetic) { phonetic = data[0].phonetic; }
                    }
                    
                    if (phonetic) {
                        phonetic = phonetic.replace(/\//g, ""); // Dọn sạch dấu gạch chéo
                    } else {
                        phonetic = word;
                    }
                    
                    // Quy tắc đuôi r: Nếu từ gốc kết thúc bằng chữ 'r' mà API thiếu ký hiệu cuộn lưỡi
                    if (word.endsWith('r') && !phonetic.endsWith('ɹ') && !phonetic.endsWith('r')) {
                        phonetic = phonetic + 'ɹ';
                    }
                    
                    ipaResults[index] = phonetic;
                    checkComplete();
                })
                .catch(err => {
                    ipaResults[index] = word;
                    checkComplete();
                });
        });

        function checkComplete() {
            completedRequests++;
            if (completedRequests === words.length) {
                ipaDiv.innerHTML = `🇺🇸 <strong>IPA (AmE):</strong> <span style="font-family: 'Segoe UI'; font-size: 16px; color: #2563eb;">/${ipaResults.join(" ")}/</span>`;
            }
        }
    }

    // --- TÍNH NĂNG 2: PHÁT LẠI LOẠT CÂU THEO CHUỖI TÙY CHỌN (1,4,5 HOẶC 1-5) ---
    function playCustomSentences() {
        var inputVal = document.getElementById('customReviewInput').value.trim();
        if (!inputVal) {
            alert("Anh vui lòng nhập số câu (ví dụ: 1,4,5 hoặc 1-5)");
            return;
        }

        customPlayQueue = []; // Reset hàng đợi cũ
        var parts = inputVal.split(',');
        
        for (var i = 0; i < parts.length; i++) {
            var part = parts[i].trim();
            if (part.includes('-')) {
                // Phân tích cú pháp khoảng, vd: 1-5
                var range = part.split('-');
                var start = parseInt(range[0], 10);
                var end = parseInt(range[1], 10);
                if (!isNaN(start) && !isNaN(end) && start <= end) {
                    for (var j = start; j <= end; j++) {
                        customPlayQueue.push(j - 1); // Đổi về index mảng bắt đầu từ 0
                    }
                }
            } else {
                // Phân tích câu đơn, vd: 4
                var num = parseInt(part, 10);
                if (!isNaN(num)) {
                    customPlayQueue.push(num - 1);
                }
            }
        }

        if (customPlayQueue.length > 0) {
            isCustomPlaying = true;
            playQueueIndex(0); // Phát câu thứ nhất trong hàng đợi tùy chọn
        } else {
            alert("Định dạng chuỗi nhập chưa đúng, anh kiểm tra lại nhé!");
        }
    }

    function playQueueIndex(queueIdx) {
        if (!isCustomPlaying || queueIdx >= customPlayQueue.length) {
            isCustomPlaying = false;
            return; // Đã phát hoàn tất toàn chuỗi
        }
        
        var targetSentenceIdx = customPlayQueue[queueIdx];
        
        if (targetSentenceIdx >= 0 && targetSentenceIdx < currentSubtitles.length) {
            currentSentenceIndex = targetSentenceIdx;
            
            // Đồng bộ UI và gọi phát nhạc
            updateNavigationUI();
            document.getElementById('userInput').value = "";
            document.getElementById('resultDisplay').innerHTML = "Kết quả đúng sai (xanh/đỏ) sẽ hiển thị ở đây.";
            if (document.getElementById('sentenceIpaDisplay')) {
                document.getElementById('sentenceIpaDisplay').innerHTML = "";
            }

            if (player && typeof player.seekTo === 'function') {
                player.seekTo(currentSubtitles[currentSentenceIndex].start, true);
                player.playVideo();
            }
            
            var sub = currentSubtitles[currentSentenceIndex];
            var durationMs = (sub.end - sub.start) * 1000;
            
            // Đợi câu hiện hành chạy xong thời gian thực, ngắt nghỉ 800ms rồi tự gọi tiếp câu kế trong chuỗi
            setTimeout(function() {
                if (isCustomPlaying) {
                    playQueueIndex(queueIdx + 1);
                }
            }, durationMs + 800);
        } else {
            playQueueIndex(queueIdx + 1); // Bỏ qua nếu index vượt mức bài học
        }
    }

    // Tra nhanh IPA từ đơn lẻ thủ công bằng tay (Hệ thống cũ của anh)
    function searchIPA() {
        var word = document.getElementById('dictWordInput').value.trim();
        var resultDiv = document.getElementById('dictResultDisplay');
        if (!word) { resultDiv.innerHTML = "Vui lòng nhập một từ."; return; }
        
        resultDiv.innerHTML = "Đang tra...";
        fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
            .then(response => response.json())
            .then(data => {
                if (data && data[0]) {
                    var phonetic = data[0].phonetic || "";
                    if (!phonetic && data[0].phonetics) {
                        for (var p of data[0].phonetics) {
                            if (p.text) { phonetic = p.text; break; }
                        }
                    }
                    if (phonetic) {
                        if (!phonetic.startsWith('/')) phonetic = '/' + phonetic;
                        if (!phonetic.endsWith('/')) phonetic = phonetic + '/';
                        resultDiv.innerHTML = `IPA của <strong>${word}</strong> là: <span style="color: #2563eb; font-size: 16px;">${phonetic}</span>`;
                    } else {
                        resultDiv.innerHTML = `Tìm thấy từ nhưng chưa có sẵn ký tự IPA.`;
                    }
                } else {
                    resultDiv.innerHTML = "❌ Không tìm thấy từ này.";
                }
            })
            .catch(err => { resultDiv.innerHTML = "⚠️ Lỗi kết nối từ điển."; });
    }

    // Hệ thống phím tắt dự phòng cho PC của anh
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey) {
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            else if (e.code === 'ArrowUp') { e.preventDefault(); rewindSentence(); }
            else if (e.code === 'ArrowRight') { e.preventDefault(); nextSentence(); }
        }
    });
</script>
