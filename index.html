    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    var subtitles = [];
    var currentSubIndex = 0;
    var loopIntervalTimer;
    var isScriptHidden = false;
    var isPlayerReady = false;

    // Các biến phục vụ việc quản lý phát lặp đoạn mới
    var isSegmentLooping = false;
    var segmentQueue = [];
    var currentSegmentQueueIndex = 0;

    // Khởi tạo danh sách bài học lên giao diện khi mở trang web
    window.onload = function() {
        var select = document.getElementById('lessonSelect');
        select.innerHTML = "";
        DANH_SACH_BAI_HOC.forEach(function(lesson, index) {
            var opt = document.createElement('option');
            opt.value = index;
            opt.innerText = lesson.title;
            select.appendChild(opt);
        });
    };

    function getYouTubeId(url) {
        var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        var match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : null;
    }

    function onYouTubeIframeAPIReady() {
        changeLesson();
    }

    function changeLesson() {
        var lessonIndex = document.getElementById('lessonSelect').value;
        var lesson = DANH_SACH_BAI_HOC[lessonIndex];
        var videoId = getYouTubeId(lesson.youtubeUrl);

        if (!videoId) return;

        subtitles = parseSrt(lesson.subtitles);
        currentSubIndex = 0;
        displaySubtitles();
        stopSegmentLoop();

        document.getElementById('userInput').value = "";
        document.getElementById('resultDisplay').innerHTML = "Kết quả đúng sai (xanh/đỏ) sẽ hiển thị ở đây.";

        if (player && isPlayerReady) {
            player.loadVideoById(videoId);
        } else {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'playsinline': 1,
                    'cc_load_policy': 0,
                    'rel': 0
                },
                events: {
                    'onReady': function() { 
                        isPlayerReady = true; 
                        if (subtitles.length > 0) selectSentence(0);
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }
    }

    function onPlayerStateChange(event) {
        var btn = document.getElementById('playPauseBtn');
        if (event.data == YT.PlayerState.PLAYING) {
            btn.innerHTML = "⏸ Tạm dừng";
            startLoopTracker();
        } else {
            btn.innerHTML = "▶ Tiếp tục phát";
            clearInterval(loopIntervalTimer);
        }
    }

    function timeToSeconds(timeString) {
        var parts = timeString.split(':');
        var secondsParts = parts[2].split(',');
        var hours = parseInt(parts[0], 10);
        var minutes = parseInt(parts[1], 10);
        var seconds = parseInt(secondsParts[0], 10);
        var milliseconds = parseInt(secondsParts[1], 10);
        return (hours * 3600) + (minutes * 60) + seconds + (milliseconds / 1000);
    }

    function parseSrt(data) {
        var srtClean = data.replace(/\r/g, '').trim();
        var sections = srtClean.split('\n\n');
        var parsed = [];

        sections.forEach(function(section) {
            var lines = section.split('\n');
            if (lines.length >= 3) {
                var timeLine = lines[1];
                var textLines = lines.slice(2).join(' ');
                var timeMatch = timeLine.match(/(\d+:\d+:\d+,\d+)\s+-->\s+(\d+:\d+:\d+,\d+)/);
                
                if (timeMatch) {
                    parsed.push({
                        start: timeToSeconds(timeMatch[1]),
                        end: timeToSeconds(timeMatch[2]),
                        text: textLines.trim()
                    });
                }
            }
        });
        return parsed;
    }

    function displaySubtitles() {
        var listContainer = document.getElementById('subtitleList');
        listContainer.innerHTML = "";
        
        subtitles.forEach(function(sub, index) {
            var item = document.createElement('div');
            item.className = "subtitle-item";
            item.id = "sub-item-" + index;
            
            var displayText = isScriptHidden ? "••••••••••••••••••••" : sub.text;
            
            item.innerHTML = `<span>Câu ${index + 1}: ${displayText}</span> <span style="color: #64748b; font-size:11px;">(${sub.start.toFixed(1)}s)</span>`;
            item.onclick = function() { selectSentence(index); };
            listContainer.appendChild(item);
        });
        
        var activeItem = document.getElementById("sub-item-" + currentSubIndex);
        if (activeItem) activeItem.className = "subtitle-item active";
    }

    function selectSentence(index) {
        if (index < 0 || index >= subtitles.length) return;
        
        currentSubIndex = index;
        
        var items = document.querySelectorAll('.subtitle-item');
        items.forEach(function(item) { item.className = "subtitle-item"; });
        var activeItem = document.getElementById("sub-item-" + index);
        if (activeItem) {
            activeItem.className = "subtitle-item active";
            activeItem.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }

        document.getElementById('userInput').value = "";
        document.getElementById('resultDisplay').innerHTML = "Kết quả đúng sai (xanh/đỏ) sẽ hiển thị ở đây.";

        if (player && typeof player.seekTo === 'function') {
            player.seekTo(subtitles[currentSubIndex].start, true);
            player.playVideo();
        }
    }

    // LOGIC KÍCH HOẠT VÒNG LẶP ĐOẠN TÙY CHỌN THEO ĐÚNG SỐ THỨ TỰ SRT
    function startSegmentLoop() {
        var inputVal = document.getElementById('loopSegments').value.trim();
        if (!inputVal) {
            alert("Anh vui lòng nhập số câu cần nghe (Ví dụ: 1,2,3)!");
            return;
        }
        if (subtitles.length === 0 || !player || typeof player.seekTo !== 'function') {
            alert("Vui lòng đợi bài nghe được nạp xong.");
            return;
        }

        var rawSegments = inputVal.split(',');
        segmentQueue = [];
        for (var i = 0; i < rawSegments.length; i++) {
            var num = parseInt(rawSegments[i].trim(), 10);
            // Đối chiếu index mảng srt (người dùng gõ câu 1 tức là mảng index 0)
            if (!isNaN(num) && num > 0 && num <= subtitles.length) {
                segmentQueue.push(num - 1);
            }
        }

        if (segmentQueue.length === 0) {
            alert("Số thứ tự câu nhập vào không đúng hoặc vượt quá số câu của bài!");
            return;
        }

        segmentQueue.sort(function(a, b) { return a - b; });

        // Tắt lặp đơn câu mặc định để tránh tranh chấp
        document.getElementById('autoLoopCheck').checked = false;
        
        isSegmentLooping = true;
        currentSegmentQueueIndex = 0;
        document.getElementById('stopLoopBtn').style.display = 'inline-block';

        playSelectedSegmentQueue();
    }

    function playSelectedSegmentQueue() {
        if (!isSegmentLooping || segmentQueue.length === 0) return;
        
        var targetIndex = segmentQueue[currentSegmentQueueIndex];
        document.getElementById('loopStatus').innerHTML = " (Đang lặp câu " + (targetIndex + 1) + ")";
        
        selectSentence(targetIndex);
    }

    function stopSegmentLoop() {
        isSegmentLooping = false;
        document.getElementById('stopLoopBtn').style.display = 'none';
        document.getElementById('loopStatus').innerHTML = "";
    }

    // BỘ GIÁM SÁT THỜI GIAN VÒNG LẶP (ĐÃ GỘP CHUNG AN TOÀN)
    function startLoopTracker() {
        clearInterval(loopIntervalTimer);
        loopIntervalTimer = setInterval(function() {
            if (subtitles.length === 0 || !player || typeof player.getCurrentTime !== 'function') return;
            
            var currentTime = player.getCurrentTime();
            
            // Trường hợp 1: Đang kích hoạt lặp đoạn phức hợp (Tính năng mới thêm)
            if (isSegmentLooping && segmentQueue.length > 0) {
                var targetIndex = segmentQueue[currentSegmentQueueIndex];
                var currentSub = subtitles[targetIndex];
                
                if (currentTime >= currentSub.end) {
                    currentSegmentQueueIndex++;
                    if (currentSegmentQueueIndex >= segmentQueue.length) {
                        currentSegmentQueueIndex = 0; // Quay về câu đầu tiên trong chuỗi đã chọn
                    }
                    playSelectedSegmentQueue();
                }
            } 
            // Trường hợp 2: Chế độ tự động lặp đơn 1 câu (Logic cũ của anh)
            else {
                var currentSub = subtitles[currentSubIndex];
                var isLoopChecked = document.getElementById('autoLoopCheck').checked;

                if (isLoopChecked && currentTime >= currentSub.end) {
                    player.seekTo(currentSub.start, true);
                }
            }
        }, 100);
    }

    function rewindSentence() {
        if (subtitles.length > 0 && player && typeof player.seekTo === 'function') {
            player.seekTo(subtitles[currentSubIndex].start, true);
            player.playVideo();
        }
    }

    function nextSentence() {
        if (subtitles.length > 0 && currentSubIndex + 1 < subtitles.length) {
            selectSentence(currentSubIndex + 1);
        } else {
            alert("Anh đã học hết các câu của bài này rồi!");
        }
    }

    function togglePlay() {
        if (!player || typeof player.getPlayerState !== 'function') return;
        if (player.getPlayerState() == YT.PlayerState.PLAYING) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    }

    function toggleScriptVisibility() {
        isScriptHidden = !isScriptHidden;
        var toggleBtn = document.getElementById('toggleScriptBtn');
        if (isScriptHidden) {
            toggleBtn.innerHTML = "👁️ Hiện đáp án danh sách";
            toggleBtn.style.backgroundColor = "#2563eb";
        } else {
            toggleBtn.innerHTML = "👁️ Ẩn đáp án danh sách";
            toggleBtn.style.backgroundColor = "#64748b";
        }
        displaySubtitles();
    }

    function cleanWord(word) {
        if(!word) return "";
        return word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"]/g,"").toLowerCase().trim();
    }

    function checkAnswers() {
        if (subtitles.length === 0) return;

        var userText = document.getElementById('userInput').value.trim();
        var correctText = subtitles[currentSubIndex].text;
        
        var userWords = userText ? userText.split(/\s+/) : [];
        var correctWords = correctText.split(/\s+/);
        var resultHtml = "";

        for (var i = 0; i < correctWords.length; i++) {
            if (i < userWords.length) {
                if (cleanWord(userWords[i]) === cleanWord(correctWords[i])) {
                    resultHtml += "<span class='word-correct'>" + correctWords[i] + "</span> ";
                } else {
                    resultHtml += "<span class='word-incorrect'>" + userWords[i] + "</span> " + "<span style='color:#64748b; font-size:13px; margin-right:8px;'>(" + correctWords[i] + ")</span>";
                }
            } else {
                resultHtml += "<span style='color: #cbd5e1;'>_ </span>";
            }
        }
        document.getElementById('resultDisplay').innerHTML = resultHtml;
    }

    function giveHint() {
        if (subtitles.length === 0) return;

        var userText = document.getElementById('userInput').value.trim();
        var correctText = subtitles[currentSubIndex].text;

        var userWords = userText ? userText.split(/\s+/) : [];
        var correctWords = correctText.split(/\s+/);

        var nextWordIndex = userWords.length;
        if (nextWordIndex < correctWords.length) {
            var nextWord = correctWords[nextWordIndex];
            document.getElementById('userInput').value = (userText + " " + nextWord).trim();
        }
    }

    function searchIPA() {
        var word = document.getElementById('ipaInput').value.trim();
        var resultDiv = document.getElementById('ipaResult');
        
        if (!word) {
            resultDiv.innerHTML = "Vui lòng nhập từ.";
            return;
        }

        resultDiv.innerHTML = "🔄 Đang tra...";

        fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${cleanWord(word)}`)
            .then(response => response.json())
            .then(data => {
                if (data && data[0]) {
                    var phonetic = data[0].phonetic || "";
                    if (!phonetic && data[0].phonetics) {
                        for (var p of data[0].phonetics) {
                            if (p.text) { phonetic = p.text; break; }
                        }
                    }
                    if (phonetic) {
                        if (!phonetic.startsWith('/')) phonetic = '/' + phonetic;
                        if (!phonetic.endsWith('/')) phonetic = phonetic + '/';
                        resultDiv.innerHTML = `IPA của <strong>${word}</strong> là: <span style="color: #2563eb; font-size: 16px;">${phonetic}</span>`;
                    } else {
                        resultDiv.innerHTML = `Tìm thấy từ nhưng chưa có sẵn ký tự IPA.`;
                    }
                } else {
                    resultDiv.innerHTML = "❌ Không tìm thấy từ này.";
                }
            })
            .catch(err => { resultDiv.innerHTML = "⚠️ Lỗi kết nối từ điển."; });
    }

    // Phím tắt PC cũ của anh
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey) {
            if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            else if (e.code === 'ArrowUp') { e.preventDefault(); rewindSentence(); }
            else if (e.code === 'ArrowRight') { e.preventDefault(); nextSentence(); }
        }
    });
    // --- LOGIC PHÁT LẠI LOẠT CÂU THEO CHUỖI TÙY CHỌN ---
var customPlayQueue = [];
var isCustomPlaying = false;

function playCustomSentences() {
    var inputVal = document.getElementById('customReviewInput').value.trim();
    if (!inputVal) { alert("Anh vui lòng nhập số câu (ví dụ: 1,4,5 hoặc 1-5)"); return; }
    customPlayQueue = [];
    var parts = inputVal.split(',');
    for (var i = 0; i < parts.length; i++) {
        var part = parts[i].trim();
        if (part.includes('-')) {
            var range = part.split('-');
            var start = parseInt(range[0], 10);
            var end = parseInt(range[1], 10);
            if (!isNaN(start) && !isNaN(end) && start <= end) {
                for (var j = start; j <= end; j++) { customPlayQueue.push(j - 1); }
            }
        } else {
            var num = parseInt(part, 10);
            if (!isNaN(num)) { customPlayQueue.push(num - 1); }
        }
    }
    if (customPlayQueue.length > 0) {
        isCustomPlaying = true;
        playQueueIndex(0);
    } else {
        alert("Định dạng nhập chưa đúng, anh kiểm tra lại nhé!");
    }
}

function playQueueIndex(queueIdx) {
    if (!isCustomPlaying || queueIdx >= customPlayQueue.length) {
        isCustomPlaying = false;
        return;
    }
    var targetSentenceIdx = customPlayQueue[queueIdx];
    if (targetSentenceIdx >= 0 && targetSentenceIdx < currentSubtitles.length) {
        currentSentenceIndex = targetSentenceIdx;
        selectSentence(currentSentenceIndex);
        var sub = currentSubtitles[currentSentenceIndex];
        var durationMs = (sub.end - sub.start) * 1000;
        setTimeout(function() {
            if (isCustomPlaying) { playQueueIndex(queueIdx + 1); }
        }, durationMs + 800);
    } else {
        playQueueIndex(queueIdx + 1);
    }
}
